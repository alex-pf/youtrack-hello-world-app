name: Production — Deploy

on:
  workflow_dispatch:

jobs:
  build:
    name: Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - run: npm ci

      - run: npm run build

      - uses: actions/upload-artifact@v4
        with:
          name: youtrack-app-dist
          path: dist/

  deploy:
    name: Deploy to Production
    needs: build
    runs-on: ubuntu-latest
    environment: production
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: youtrack-app-dist
          path: dist/

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - run: npm install -g @jetbrains/youtrack-apps-tools

      - name: Upload to YouTrack (Production)
        env:
          YOUTRACK_HOST: ${{ secrets.YOUTRACK_PRODUCTION_HOST }}
          YOUTRACK_API_TOKEN: ${{ secrets.YOUTRACK_PRODUCTION_TOKEN }}
        run: youtrack-app upload dist
